# ─── NOTES FOR THE QA AGENT ────────────────────────────────────────────────

notes_for_agent: |
  Agente, por favor:

  1. CLASSIFICAÇÃO DE ACHADOS
     - [BUG]   fluxo existe e quebrou → abre issue com gravidade
     - [GAP]   fluxo descrito aqui ainda não implementado → reporta como roadmap item
     - [DRIFT] UI mudou sem atualizar manifest → pede atualização desta spec

  2. PRIORIDADE DE TESTE (por impacto):
     A. Autenticação (Clerk)
     B. Fluxo editorial: stage_1 plan → stage_2 videos → stage_3 publish
     C. Student journey mode_1 happy path
     D. Student journey mode_2 happy path
     E. Anti-behaviors (teste adversário)
     F. Content safety (tentar subir PDF com trigger)
     G. Responsividade (375/768/desktop)

  3. NUNCA DISPARE EM QA:
     - Geração real de vídeo caro (use TEST_MODE=dry_run se disponível)
     - Publicação real de disciplina (use staging ou use feature flag)
     - Operações destrutivas (DELETE disciplina, revogar professor ativo)

  4. VALIDAÇÃO VISUAL:
     - Quando assert é difícil em código (layout, emoção), use Vision LLM
     - Screenshot + prompt "isso parece certo dado [expected_behavior]?"
     - Reporte com confiança: high/medium/low

  5. FORMATO DO REPORT:
     - Telegram DM: resumo (X pass, Y fail, Z gap) + screenshots dos fails
     - Markdown report completo em /qa/reports/YYYY-MM-DD-HHMM.md
     - GitHub issue auto-criada por bug (opcional, via flag)
